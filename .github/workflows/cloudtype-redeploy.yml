name: Cloudtype 재배포 (수동)

# GitHub Actions 탭 → 이 워크플로 → "Run workflow" 버튼 한 번으로
# 실앱 워크로드 'urban-shrinkage'를 최신 main 코드로 **강제 재배포**한다.
# 대시보드 '재배포'가 헛도는(새 배포가 안 생기는) 문제를 우회 — API로 확실히 최신 커밋을 빌드.
#
# ★ 필요: GitHub Secret CLOUDTYPE_TOKEN (= Cloudtype API 키, 이미 등록됨).
# ⚠ 첫 실행 후 Cloudtype 대시보드에서 'urban-shrinkage' 워크로드의
#    메모리/상시가동(하비) 설정이 유지됐는지 한 번 확인할 것. 풀렸으면 다시 구독 리소스로.

on:
  workflow_dispatch:          # 손으로 즉시 실행(버튼)

concurrency:
  group: cloudtype-redeploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Cloudtype 재배포 — 실앱 워크로드(urban-shrinkage)를 최신 main으로
        uses: cloudtype-github-actions/deploy@v1
        with:
          token: ${{ secrets.CLOUDTYPE_TOKEN }}
          project: urban-shrinkage
          stage: main
          yaml: |
            name: urban-shrinkage
            app: dockerfile
            options:
              ports: 8501
            context:
              git:
                url: https://github.com/uurimii16/urban-shrinkage.git
                ref: refs/heads/main
              preset: dockerfile
