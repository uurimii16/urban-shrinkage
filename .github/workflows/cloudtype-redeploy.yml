name: Cloudtype Auto Redeploy (keep alive)

# Cloudtype 무료 플랜은 '하루 1회 강제 중지'가 있어 그 시간대엔 URL이 404가 된다.
# 단순 HTTP 핑으로는 안 켜지고 '재배포'해야 다시 켜진다.
# 이 워크플로는 Cloudtype 공식 API(cloudtype-github-actions/deploy)로 앱을 재배포해
# 강제중지된 앱을 새 컨테이너로 다시 켠다. 자동배포 토글/웹훅이 없어도 동작한다.
#
# ★ 사전 준비(딱 1번): GitHub Secret 등록
#   리포 Settings → Secrets and variables → Actions → New repository secret
#   Name = CLOUDTYPE_TOKEN, Secret = Cloudtype API 키(스페이스 설정 → 인증 → API키 생성)

on:
  schedule:
    # UTC 기준. 한국시간(KST=UTC+9)으로 09시, 13시, 17시에 재배포 → 낮 근무시간 커버.
    - cron: "0 0,4,8 * * *"
  workflow_dispatch:   # 필요할 때 손으로 즉시 실행하는 버튼

concurrency:
  group: cloudtype-redeploy
  cancel-in-progress: false

jobs:
  redeploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Cloudtype 재배포 (앱 다시 켜기)
        uses: cloudtype-github-actions/deploy@v1
        with:
          token: ${{ secrets.CLOUDTYPE_TOKEN }}
          project: urban-shrinkage      # 프로젝트 이름
          stage: main                   # 배포환경(스테이지) 이름
          yaml: |
            name: app
            app: dockerfile
            options:
              ports: 8501
            context:
              git:
                url: https://github.com/uurimii16/urban-shrinkage.git
                ref: refs/heads/main
              preset: dockerfile
