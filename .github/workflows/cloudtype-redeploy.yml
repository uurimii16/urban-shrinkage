name: Cloudtype Auto Redeploy (keep alive)

# Cloudtype 무료 플랜은 '하루 1회 강제 중지'가 있고, 이건 단순 HTTP 핑
# (keep-awake-cloudtype.yml)으로는 다시 켜지지 않는다. 여기서는 하루 몇 번
# 빈 커밋을 push 해서 Cloudtype의 '자동배포(Auto Deploy)'를 트리거한다.
# 재배포되면 강제중지된 앱도 새 컨테이너로 다시 켜진다.
#
# ★ 사전 준비(딱 1번): Cloudtype 대시보드 → 이 앱 → '자동배포(Auto Deploy)' 토글 ON.
#    (자동배포가 켜져 있어야 push가 재배포로 이어짐)

on:
  schedule:
    # UTC 기준. 한국시간(KST=UTC+9)으로 09시, 13시, 17시에 재배포 → 낮 근무시간 커버.
    - cron: "0 0,4,8 * * *"
  workflow_dispatch:   # 필요할 때 손으로 즉시 실행하는 버튼

permissions:
  contents: write      # 빈 커밋 push 권한

concurrency:
  group: cloudtype-redeploy
  cancel-in-progress: false

jobs:
  redeploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 빈 커밋으로 Cloudtype 자동배포 트리거
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit --allow-empty -m "chore: keep Cloudtype awake (auto redeploy)"
          git push
