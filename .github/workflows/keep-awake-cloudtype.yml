name: Keep Cloudtype App Awake
on:
  schedule:
    - cron: "*/15 * * * *"    # 15분마다(UTC) — '매일 1회 중지' 후 곧바로 재기동
  workflow_dispatch:           # 수동 실행 버튼
jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Ping Cloudtype app
        env:
          # repo Settings > Secrets and variables > Actions > Variables 에
          # CLOUDTYPE_URL 을 만들면 그 값을 사용(예: https://xxx.cloudtype.app).
          # 없으면 스크립트가 조용히 건너뜀.
          CLOUDTYPE_URL: ${{ vars.CLOUDTYPE_URL }}
        run: python .github/keep_awake_cloudtype.py
