name: Keep Cloudtype App Awake
on:
  schedule:
    - cron: "*/10 * * * *"    # 10분마다(UTC) — 절전 전에 미리 깨워 warm 유지
  workflow_dispatch:           # 수동 실행 버튼
jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Ping Cloudtype app
        env:
          # 기본값에 실제 배포 URL을 박아 별도 설정 없이 자동 동작.
          # (repo Variable CLOUDTYPE_URL 을 만들면 그 값이 우선)
          CLOUDTYPE_URL: ${{ vars.CLOUDTYPE_URL || 'https://port-0-urban-shrinkage-mr9vlx4ea220fe3d.sel3.cloudtype.app' }}
        run: python .github/keep_awake_cloudtype.py
